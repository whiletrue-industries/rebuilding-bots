[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
log_cli = true
log_cli_level = INFO
# Put the repo root on sys.path so `from backend.api.server import app`
# resolves — backend/ and backend/api/ carry empty __init__.py making
# them proper packages for the test layer. Runtime is unaffected because
# uvicorn is invoked from inside /srv/backend/api/ where `server` is a
# top-level module.
pythonpath = .
markers =
    asyncio: mark test as async
