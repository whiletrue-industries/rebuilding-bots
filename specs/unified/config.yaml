- slug: ethics_decisions
  name: החלטות ועדת אתיקה בדבר כללי אתיקה לחברי הכנסת
  description: 'Search ethics committee rulings and ethics rules for Knesset members.
    Use for: donations and gifts to MKs (תרומות, מתנות), conflicts of interest (ניגוד
    עניינים), ethical violations, sanctions, complaints against MKs, outside employment
    restrictions, financial disclosure requirements.'
  examples: תרומה לחבר כנסת, ניגוד עניינים, הפרת כללי אתיקה, סנקציות
  # Title-rich Hebrew document corpus — opt into BM25 alongside vector.
  use_lexical_search: true
  sources:
  - type: csv
    source: extraction/ethics_decisions/index.csv
    fetcher:
      kind: knesset_apps_ethics
      page_name: "EthicsDecisions25"
      committee_id: 2217
      knesset_num: 25
      # Historical coverage of older Knessets (K15-K23, ~1999–2021)
      # is achieved by SEEDING extraction/ethics_decisions/index.csv
      # with rows scraped once via a headed browser (2026-05-13)
      # from the per-Knesset CommitteeDecisionsN.aspx archive pages —
      # those pages are gated behind the Knesset CDN's JS challenge
      # so a backend fetcher can't reach them directly. On every
      # fetcher run, that committed file is loaded, live K25 is
      # fetched, and the merged result is written back (live wins on
      # URL collisions). The K25 portion churns; the K15-K23 portion
      # stays stable forever. Refresh once per future Knesset
      # turnover.
  - type: csv
    source: extraction/ethics_committee_decisions.csv
    fetcher:
      kind: indexed_pdf
      local_index_csv_path: extraction/ethics_decisions/index.csv
      fields:
      - name: שם_החלטה
        description: שם ההחלטה או ההודעה
        example: החלטה בעניין תלונה נגד חבר הכנסת יוסי כהן
        hint: חפש את הכותרת או שם ההחלטה בתחילת המסמך
      - name: תקופת_כנסת
        description: תקופת הכנסת (למשל - הכנסת הראשונה, הכנסת השנייה וכו')
        example: הכנסת העשרים וחמש
        hint: חפש אזכורים של תקופות כנסת בכותרות המסמך או במבוא
      - name: תאריך
        description: תאריך החלטת ועדת האתיקה
        example: '2023-05-12'
        hint: חפש תאריכים בכותרות המסמך
      - name: סדר_החלטה
        description: סדר ההחלטה בתוך מסמך ההחלטות
        example: החלטה מס' 5
        hint: חפש החלטות ממוספרות או אינדיקטורים של סדר במסמך
      - name: נושא_אדם_מעורב
        description: נושא/אדם מעורב במקרה
        example: חבר הכנסת יוסי כהן
        hint: זהה את האדם או הנושא שההחלטה מתייחסת אליו
      - name: אופי_תלונה
        description: אופי התלונה
        example: ניגוד עניינים, הפרת כללי אתיקה
        hint: הפק את סוג או אופי הפרת האתיקה או התלונה
      - name: רקע
        description: רקע המקרה
        example: התלונה הוגשה על ידי אזרח בעניין...
        hint: חפש מידע רקע על המקרה והנסיבות
      - name: ממצאי_הוועדה
        description: ממצאי הוועדה
        example: הוועדה מצאה כי...
        hint: הפק את הממצאים העובדתיים והמסקנות של הוועדה
      - name: נימוקים
        description: נימוקים והצדקה של הוועדה
        example: תבסס על...
        hint: חפש את הנימוקים וההצדקה המשפטית/אתית של הוועדה
      - name: סוג_החלטה
        description: סוג החלטה
        example: החלטה, אזהרה, נזיפה
        hint: זהה את סוג ההחלטה שהתקבלה על ידי הוועדה
      - name: תוצאה_עונש
        description: תוצאה/עונש שהוטל
        example: נזיפה חמורה, אזהרה
        hint: הפק את העונש או התוצאה הספציפית שהוטלה
      - name: תנאים
        description: תנאים או דרישות שהוטלו
        example: על חבר הכנסת להימנע מפעילות מסוימת
        hint: חפש תנאים, דרישות או הגבלות שהוטלו
      - name: טקסט_מלא
        description: תוכן מלא של ההחלטה
        hint: תמיד כלול את כל הטקסט של מסמך כפי שהופק מה-PDF, בעברית.
        example: '...'
      extraction_instructions: 'הפק את השדות הנדרשים מהטקסט של קובץ ה-PDF. השתמש ברשימת
        השדות וההנחיות. החזר אובייקט JSON שבו שמות השדות, אך כל הערכים בשפה המקורית
        (עברית) כפי שמופיעים במסמך. אל תתרגם או תשנה את הטקסט המקורי. ודא ששדה full_text
        תמיד מכיל את כל הטקסט של המסמך כפי שהופק מה-PDF.

        אם המסמך מכיל מספר החלטות או מקרים נפרדים (למשל החלטות ממוספרות 1, 2, 3, 4
        או מקרים שונים של אנשים שונים), הפק מידע עבור כל החלטה בנפרד. החזר מערך של
        אובייקטים JSON, כל אובייקט מייצג החלטה אחת. עבור כל החלטה, מלא את השדות הרלוונטיים
        לאותה החלטה ספציפית. אם יש מספר החלטות, החזר מערך של אובייקטים במקום אובייקט
        בודד.

