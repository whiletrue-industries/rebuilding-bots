- slug: legal_advisor_opinions
  name: חוות דעת היועצת המשפטית לכנסת
  description: 'Search formal legal opinions by Knesset legal advisor. Use for: legal
    interpretations, formal legal guidance, precedents, legal analysis.'
  examples: חוות דעת על ניגוד עניינים, פרשנות משפטית, הנחיה פורמלית
  # Title-rich Hebrew document corpus — BM25 ranks verbatim-title queries
  # correctly where text-embedding-3-small cosine fails. Opt back into the
  # lexical RRF branch; mode default (false) does not apply here.
  use_lexical_search: true
  sources:
  - type: csv
    source: extraction/legal_advisor_opinions/index.csv
    fetcher:
      kind: knesset_sharepoint_legal_advisor
      page_url: https://main.knesset.gov.il/about/departments/pages/leg/ldguidelines.aspx
  - type: csv
    source: extraction/knesset_legal_advisor.csv
    fetcher:
      kind: indexed_pdf
      local_index_csv_path: extraction/legal_advisor_opinions/index.csv
      fields:
      - name: מספר_מסמך
        description: מספר המסמך או מזהה ייחודי
        example: מכתב מס' 2023/123
        hint: חפש מספרי מסמכים או מזהה ייחודי בכותרות או בתחילת המסמך
      - name: תאריך_מכתב
        description: תאריך כתיבת המכתב
        example: '2023-05-12'
        hint: חפש תאריכים בכותרות המסמך או בתחילתו
      - name: סוג_מסמך
        description: סוג המסמך (מכתב פנייה או מכתב תשובה)
        example: מכתב פנייה, מכתב תשובה
        hint: זהה אם זה מכתב פנייה או מכתב תשובה
      - name: סוג_הפניה
        description: סוג הפנייה לפי הקטגוריות המוגדרות
        example: פניות ומענה לחברי הכנסת
        hint: 'בחר אחת מהאפשרויות: פניות ומענה לחברי הכנסת, פניות ומענה לגורמים ברשות
          המבצעת, פניות ומענה לציבור'
      - name: שולח
        description: שם השולח או הגורם השולח
        example: יושב ראש הכנסת, מזכיר הכנסת
        hint: זהה את הגורם השולח את המכתב
      - name: נמען
        description: שם הנמען או הגורם הנמען
        example: חבר הכנסת יוסי כהן, שר האוצר
      - name: נושא_כללי
        description: נושא כללי מתוך הרשימה המוגדרת
        example: ועדות הכנסת
        hint: 'בחר אחת מהאפשרויות: חברי הכנסת, ועדות הכנסת, הליך החקיקה, מליאת הכנסת,
          מינויים מיוחדים, עובדי הכנסת, כללי'
      - name: נושא_ספציפי
        description: נושא ספציפי של המסמך
        example: הסדרת ניגוד עניינים לחברי ועדה
        hint: הפק את הנושא הספציפי של המסמך כפי שמופיע בתוכן
      - name: תקציר
        description: תקציר קצר של עיקרי המסמך
        example: המסמך עוסק בהנחיות למינוי יועצים משפטיים לוועדות הכנסת...
        hint: כתוב תקציר קצר של הנושא העיקרי במסמך
      - name: המלצות_הנחיות
        description: עיקרי ההמלצות או ההנחיות במסמך
        example: יש להקפיד על ניגוד עניינים במינוי יועצים
        hint: הפק את עיקרי ההמלצות או ההנחיות
      - name: הערות
        description: הערות נוספות או פרטים חשובים
        example: המסמך הופץ לכל חברי הכנסת
        hint: הוסף הערות או פרטים חשובים נוספים
      - name: קישור_למקור
        # No example URL: when the extractor couldn't find a real URL
        # in the PDF body it used to interpolate this template into a
        # fabricated URL (e.g. opinion_2026_99.pdf). Without the example
        # the LLM falls back to leaving the field empty (per dynamic_
        # extraction prompt rule 6) — and the canonical URL still
        # reaches the doc via the index CSV's `url` column → metadata.
        description: 'קישור ישיר לקובץ ה-PDF — השאר ריק אם אינו מופיע במפורש בטקסט המסמך.'
      - name: טקסט_מלא
        description: תוכן מלא של המסמך
        hint: תמיד כלול את כל הטקסט של מסמך כפי שהופק מה-PDF, בעברית.
        example: '...'
      extraction_instructions: 'הפק את השדות הנדרשים מהטקסט של קובץ ה-PDF. השתמש ברשימת
        השדות וההנחיות. החזר אובייקט JSON שבו שמות השדות, אך כל הערכים בשפה המקורית
        (עברית) כפי שמופיעים במסמך. אל תתרגם או תשנה את הטקסט המקורי. ודא ששדה טקסט_מלא
        תמיד מכיל את כל הטקסט של המסמך כפי שהופק מה-PDF.

        עבור שדה נושא_כללי, בחר אחת מהאפשרויות הבאות:

        - חברי הכנסת

        - ועדות הכנסת

        - הליך החקיקה

        - מליאת הכנסת

        - מינויים מיוחדים

        - עובדי הכנסת

        - כללי

        עבור שדה נושא_ספציפי, הפק את הנושא הספציפי של המסמך כפי שמופיע בתוכן.

        אם המסמך מכיל מספר חוות דעת/הנחיות/מכתבים נפרדים, הפק מידע עבור כל אחד בנפרד.
        החזר מערך של אובייקטים JSON, כל אובייקט מייצג מסמך אחד.

        '
