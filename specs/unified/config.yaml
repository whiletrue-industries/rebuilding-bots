- slug: knesset_protocols
  name: פרוטוקולי דיונים בכנסת (ועדות + מליאה)
  description: 'Search transcripts of Knesset committee discussions and plenary
    proceedings (פרוטוקולי ועדה / דברי הכנסת). Each result is one speaker turn
    with metadata (committee or plenum, date, agenda item, speaker name + party,
    role: chair / speaker / interjection). Use for: what was actually said in a
    specific debate or hearing, who spoke for or against a bill, MK quotes
    on a topic, chair rulings, expert testimony before committees, questions
    asked by MKs in committees. Cite the file_url + session_label + speaker
    when summarizing.'
  examples: 'מה אמר ראש הממשלה בדיון על תקציב הביטחון, מה הייתה עמדת היועצת המשפטית
    בוועדת הכספים על תיקון מס הכנסה, ציטוטים של ח"כ בנושא X, התבטאויות בדיון
    על הצעת חוק Y'
  sources:
  - type: csv
    source: extraction/knesset_protocols.csv
    fetcher:
      kind: knesset_protocols
      base_url: https://knesset.gov.il/Odata/ParliamentInfo.svc
      days_history: 30
      max_protocols: 1000
      rate_limit_seconds: 0.25
- slug: plenary_schedule
  name: לוח מליאה (לו"ז המליאה)
  description: 'Search the Knesset plenary sitting schedule (לוח מליאה / לו"ז המליאה).
    Use for: upcoming and recent plenary sittings, scheduled bill readings (קריאה
    ראשונה / שנייה / שלישית), urgent motions for the agenda (הצעה דחופה לסדר
    היום), no-confidence motions, and any time-of-day / date question about
    when the plenum is meeting. Each row carries the session date+time and one
    agenda item; an empty agenda is represented by a single row with no item.'
  examples: 'מה על סדר היום של המליאה השבוע, מתי הקריאה השנייה של חוק X, אילו
    הצעות חוק נדונות מחר במליאה'
  sources:
  - type: csv
    source: extraction/plenary_schedule.csv
    fetcher:
      kind: knesset_odata
      base_url: https://knesset.gov.il/Odata/ParliamentInfo.svc
      days_past: 365
      days_future: 90
- slug: government_decisions
  name: החלטות ממשלה (מאגר ההחלטות)
  description: 'Search Israeli cabinet (government) decisions from gov.il. Use for:
    cabinet resolutions, government decisions on legislation, ministerial approvals,
    appointments to gov-controlled bodies, policy decisions, decisions on Knesset
    bills (support/oppose at preliminary reading).'
  examples: החלטת ממשלה על תקציב, מינוי שר, אישור הצעת חוק בקריאה טרומית, החלטה
    בנושא בריאות
  # Title-rich Hebrew document corpus — text-embedding-3-small ranks verbatim-
  # title queries at rank #13,904 of 29,795 (probed 2026-05-12), while BM25
  # surfaces the same target at #1. Opt back into the lexical RRF branch.
  use_lexical_search: true
  # NOTE: write_decision() in aurora_writer.py calls _chunk_for_embedding()
  # with no max_tokens arg, so this value is currently unused — actual chunks
  # are 600 tokens (the code-level default). Set to 600 here to match reality.
  chunk_max_tokens: 600
  chunk_overlap_tokens: 80
  fetcher:
    kind: gov_il_decisions
    page_size: 50
    max_pages: 1000
