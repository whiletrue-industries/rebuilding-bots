- slug: committee_decisions
  name: החלטות ועדות הכנסת
  description: 'Search the knesset committee decisions. Use for: the knesset committee
    resolutions, procedural decisions, administrative committee matters.'
  examples: החלטת ועדת הכנסת על נוהל, החלטה פרוצדורלית, הסדר עבודה
  # Title-rich Hebrew document corpus — opt into BM25 alongside vector.
  use_lexical_search: true
  sources:
  - type: csv
    source: extraction/committee_decisions/index.csv
    fetcher:
      kind: knesset_apps_committee
      committee_id: 2211
      from_date: "2022-11-15"
      knesset_ids: "25"
  - type: csv
    source: extraction/knesset_committee_decisions.csv
    fetcher:
      kind: indexed_pdf
      local_index_csv_path: extraction/committee_decisions/index.csv
      fields:
      - name: שם_החלטה
        description: שם ההחלטה או הנושא המרכזי
        example: החלטה בעניין סדרי עבודה בוועדה
        hint: חפש את הכותרת או שם ההחלטה בתחילת המסמך
      - name: מספר_החלטה
        description: מספר החלטה (אם קיים)
        example: החלטה מס' 12
