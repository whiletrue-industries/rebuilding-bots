slug: unified
name: בוטנים
description: עונה על שאלות מתוך תקנון הכנסת וחוקים נלווים, מתוך ספר החוקים הפתוח
  (החקיקה הראשית והמשנית של מדינת ישראל), וכן על שאלות בנושאי תקציב המדינה,
  הכנסות המדינה, התקשרויות ותמיכות תקציביות
tools:
- code-interpreter
- budgetkey
- generate_word_doc
- botnim
context:
- slug: common_budget_knowledge
  name: ידע רלוונטי על התקציב
  max_num_results: 7
  sources:
  - type: split
    source: common-knowledge.md
- slug: common_takanon_knowledge
  name: ידע רלוונטי על התקנון ועל האופן בו הכנסת מתנהלת
  max_num_results: 7
  sources:
  - type: google-spreadsheet
    source: https://docs.google.com/spreadsheets/d/1fEgiCLNMQQZqBgQFlkABXgke8I2kI1i1XUvj8Yba9Ow/edit?gid=0#gid=0
  - type: csv
    source: extraction/lexicon.csv
    fetcher:
      kind: lexicon
  # Law content (כללי אתיקה, חוק הפרשנות) moved to israeli_laws (single source
  # of statutory law). This context is glossary-only now.
# legal_text retired 2026-06-22 — israeli_laws (the open law book) is now the
# single source of statutory law. All 8 of its laws (תקנון הכנסת, חוק הכנסת,
# חוק־יסוד: הכנסת, חוק חסינות, …, החלטת שכר) live in israeli_laws; the gold-set
# §86 / ועדת חקירה queries pass at parity-or-better via metadata_filter law_name.
- slug: israeli_laws
  name: ספר החוקים הפתוח — חקיקה ראשית ומשנית של מדינת ישראל
  description: 'Search the full text of Israeli primary and secondary legislation
    (laws, ordinances, regulations) from the open law book (ספר החוקים הפתוח).
    Use for: any question about what an Israeli statute says, who it applies to,
    definitions, offences, penalties, and procedures — e.g. חוק האזנת סתר, חוק
    הגנת הפרטיות, חוק חופש המידע. Each result is one section (סעיף) with its
    chapter context. Cite the law name + section + the WikiSource source_url.
    NOTE: this is the consolidated text as maintained on ויקיטקסט — not the
    official רשומות, and not a substitute for legal advice.'
  examples: 'האם חוק האזנת סתר חל על אזרחים, מה העונש על האזנת סתר, הגדרת מידע
    לפי חוק הגנת הפרטיות, מתי מותר לרשות לסרב לבקשת חופש מידע'
  # Title-rich Hebrew legal corpus — verbatim law-name queries need a lexical
  # signal alongside vector cosine. lexical_strategy was `trigram`, but
  # pg_trgm's word-similarity operator (`%>`) is NOT index-able: on the 185K-doc
  # open law book it forces a full parallel seq scan computing word_similarity()
  # per row (~20s, EXPLAIN-verified 2026-06-29), blowing the 12s retrieve
  # deadline → 504s. Switched to `tsquery`, which uses the documents_tsv_gin GIN
  # index (@@, ~0.8s) and ranks on DocumentTitle (tsv weight A, migration 0004)
  # — now populated across all 185K docs by the 2026-06-28 re-extraction, so the
  # original "simple tsv has no title signal" reason for trigram no longer holds.
  # Vector recall for Hebrew construct-state variants is covered by the
  # per-context partial HNSW index (documents_embedding_hnsw_il).
  use_lexical_search: true
  lexical_strategy: tsquery
  sources:
  - type: split
    source: extraction/law_book/*_structure_content.json
    fetcher:
      kind: wikisource_law_book
      include_regulations: true
      min_expected_laws: 200
- slug: legal_advisor_opinions
  name: חוות דעת היועצת המשפטית לכנסת
  description: 'Search formal legal opinions by Knesset legal advisor. Use for: legal
    interpretations, formal legal guidance, precedents, legal analysis.'
  examples: חוות דעת על ניגוד עניינים, פרשנות משפטית, הנחיה פורמלית
  # Title-rich Hebrew document corpus — BM25 ranks verbatim-title queries
  # correctly where text-embedding-3-small cosine fails. Opt back into the
  # lexical RRF branch; mode default (false) does not apply here.
  use_lexical_search: true
  sources:
  - type: csv
    source: extraction/legal_advisor_opinions/index.csv
    fetcher:
      kind: knesset_sharepoint_legal_advisor
      page_url: https://main.knesset.gov.il/about/departments/pages/leg/ldguidelines.aspx
  - type: csv
    source: extraction/knesset_legal_advisor.csv
    fetcher:
      kind: indexed_pdf
      local_index_csv_path: extraction/legal_advisor_opinions/index.csv
      fields:
      - name: מספר_מסמך
        description: מספר המסמך או מזהה ייחודי
        example: מכתב מס' 2023/123
        hint: חפש מספרי מסמכים או מזהה ייחודי בכותרות או בתחילת המסמך
      - name: תאריך_מכתב
        description: תאריך כתיבת המכתב
        example: '2023-05-12'
        hint: חפש תאריכים בכותרות המסמך או בתחילתו
      - name: סוג_מסמך
        description: סוג המסמך (מכתב פנייה או מכתב תשובה)
        example: מכתב פנייה, מכתב תשובה
        hint: זהה אם זה מכתב פנייה או מכתב תשובה
      - name: סוג_הפניה
        description: סוג הפנייה לפי הקטגוריות המוגדרות
        example: פניות ומענה לחברי הכנסת
        hint: 'בחר אחת מהאפשרויות: פניות ומענה לחברי הכנסת, פניות ומענה לגורמים ברשות
          המבצעת, פניות ומענה לציבור'
      - name: שולח
        description: שם השולח או הגורם השולח
        example: יושב ראש הכנסת, מזכיר הכנסת
        hint: זהה את הגורם השולח את המכתב
      - name: נמען
        description: שם הנמען או הגורם הנמען
        example: חבר הכנסת יוסי כהן, שר האוצר
      - name: נושא_כללי
        description: נושא כללי מתוך הרשימה המוגדרת
        example: ועדות הכנסת
        hint: 'בחר אחת מהאפשרויות: חברי הכנסת, ועדות הכנסת, הליך החקיקה, מליאת הכנסת,
          מינויים מיוחדים, עובדי הכנסת, כללי'
      - name: נושא_ספציפי
        description: נושא ספציפי של המסמך
        example: הסדרת ניגוד עניינים לחברי ועדה
        hint: הפק את הנושא הספציפי של המסמך כפי שמופיע בתוכן
      - name: תקציר
        description: תקציר קצר של עיקרי המסמך
        example: המסמך עוסק בהנחיות למינוי יועצים משפטיים לוועדות הכנסת...
        hint: כתוב תקציר קצר של הנושא העיקרי במסמך
      - name: המלצות_הנחיות
        description: עיקרי ההמלצות או ההנחיות במסמך
        example: יש להקפיד על ניגוד עניינים במינוי יועצים
        hint: הפק את עיקרי ההמלצות או ההנחיות
      - name: הערות
        description: הערות נוספות או פרטים חשובים
        example: המסמך הופץ לכל חברי הכנסת
        hint: הוסף הערות או פרטים חשובים נוספים
      - name: קישור_למקור
        # No example URL: when the extractor couldn't find a real URL
        # in the PDF body it used to interpolate this template into a
        # fabricated URL (e.g. opinion_2026_99.pdf). Without the example
        # the LLM falls back to leaving the field empty (per dynamic_
        # extraction prompt rule 6) — and the canonical URL still
        # reaches the doc via the index CSV's `url` column → metadata.
        description: 'קישור ישיר לקובץ ה-PDF — השאר ריק אם אינו מופיע במפורש בטקסט המסמך.'
      - name: טקסט_מלא
        description: תוכן מלא של המסמך
        hint: תמיד כלול את כל הטקסט של מסמך כפי שהופק מה-PDF, בעברית.
        example: '...'
      extraction_instructions: 'הפק את השדות הנדרשים מהטקסט של קובץ ה-PDF. השתמש ברשימת
        השדות וההנחיות. החזר אובייקט JSON שבו שמות השדות, אך כל הערכים בשפה המקורית
        (עברית) כפי שמופיעים במסמך. אל תתרגם או תשנה את הטקסט המקורי. ודא ששדה טקסט_מלא
        תמיד מכיל את כל הטקסט של המסמך כפי שהופק מה-PDF.

        עבור שדה נושא_כללי, בחר אחת מהאפשרויות הבאות:

        - חברי הכנסת

        - ועדות הכנסת

        - הליך החקיקה

        - מליאת הכנסת

        - מינויים מיוחדים

        - עובדי הכנסת

        - כללי

        עבור שדה נושא_ספציפי, הפק את הנושא הספציפי של המסמך כפי שמופיע בתוכן.

        אם המסמך מכיל מספר חוות דעת/הנחיות/מכתבים נפרדים, הפק מידע עבור כל אחד בנפרד.
        החזר מערך של אובייקטים JSON, כל אובייקט מייצג מסמך אחד.

        '
